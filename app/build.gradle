apply plugin: 'com.android.application'

// Optional release signing. Keystore + passwords are NEVER committed.
// Provide a keystore.properties at the project root, or set env vars:
//   THWS_KEYSTORE_FILE / THWS_KEYSTORE_PASSWORD / THWS_KEY_ALIAS / THWS_KEY_PASSWORD
def keystorePropsFile = rootProject.file("keystore.properties")
def keystoreProps = new Properties()
def hasReleaseSigning = false
if (keystorePropsFile.exists()) {
    keystoreProps.load(new FileInputStream(keystorePropsFile))
    hasReleaseSigning = true
} else if (System.getenv("THWS_KEYSTORE_FILE")) {
    keystoreProps.setProperty("storeFile", System.getenv("THWS_KEYSTORE_FILE"))
    keystoreProps.setProperty("storePassword", System.getenv("THWS_KEYSTORE_PASSWORD") ?: "")
    keystoreProps.setProperty("keyAlias", System.getenv("THWS_KEY_ALIAS") ?: "")
    keystoreProps.setProperty("keyPassword", System.getenv("THWS_KEY_PASSWORD") ?: "")
    hasReleaseSigning = true
}

android {
    namespace "com.wgra.teenhealthshowdown"
    compileSdk 34

    defaultConfig {
        applicationId "com.wgra.teenhealthshowdown"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 6
        versionName "1.0.5"
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file(keystoreProps['storeFile'])
                storePassword keystoreProps['storePassword']
                keyAlias keystoreProps['keyAlias']
                keyPassword keystoreProps['keyPassword']
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            debuggable false
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lint {
        abortOnError false
    }
}

// No runtime dependencies — WebView ships with the Android framework.
dependencies { }
